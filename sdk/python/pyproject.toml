[project]
name = "lingshu-client"
version = "0.1.0"
description = "LingShu Python SDK — 分布式 Agent 系统 Python 客户端"
requires-python = ">=3.10"
license = {text = "MIT OR Apache-2.0"}
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
    "websockets>=12.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.23"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
