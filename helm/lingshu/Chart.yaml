apiVersion: v2
name: lingshu
description: Lingshu Agent Runtime — 生产级 AI Agent 运行平台
type: application
version: 4.1.0
appVersion: "4.1.0"

keywords:
  - agent
  - runtime
  - ai
  - llm
  - workflow

home: https://github.com/lingshu/agent-runtime
maintainers:
  - name: Lingshu Team
    email: team@lingshu.ai

dependencies:
  - name: postgresql
    version: ~15.5.0
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
    alias: postgresql
  - name: redis
    version: ~19.6.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
    alias: redis
