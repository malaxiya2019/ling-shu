{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lingshu.fullname" . }}-alert-rules
  labels:
    {{- include "lingshu.labels" . | nindent 4 }}
data:
  lingshu-alerts.yaml: |
    groups:
      - name: lingshu-service
        rules:
          - alert: LingshuDown
            expr: up{job="{{ include "lingshu.fullname" . }}"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Lingshu instance {{ "{{" }} $labels.instance {{ "}}" }} is down"
              description: "Lingshu has been unreachable for more than 1 minute."

          - alert: LingshuHighCPULoad
            expr: |
              avg(rate(process_cpu_seconds_total{job="{{ include "lingshu.fullname" . }}"}[5m])) 
              / on(instance) avg(machine_cpu_cores) > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU load on Lingshu instance"
              description: "CPU load > 80% for 5 minutes (current: {{ "{{" }} $value | humanizePercentage {{ "}}" }})"

          - alert: LingshuMemoryUsageHigh
            expr: |
              (process_resident_memory_bytes{job="{{ include "lingshu.fullname" . }}"} 
              / on(instance) machine_memory_bytes) > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on Lingshu instance"
              description: "Memory usage > 85% for 5 minutes (current: {{ "{{" }} $value | humanizePercentage {{ "}}" }})"

          - alert: LingshuHighTokenUsage
            expr: |
              rate(ls_llm_tokens_total{job="{{ include "lingshu.fullname" . }}"}[5m]) > 100000
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High token consumption rate"
              description: "Token usage > 100K tokens/min (current: {{ "{{" }} $value | humanize {{ "}}" }}/min)"

          - alert: LingshuLLMErrorRateHigh
            expr: |
              rate(ls_llm_invocations_total{job="{{ include "lingshu.fullname" . }}", status="error"}[5m])
              / on(instance) rate(ls_llm_invocations_total{job="{{ include "lingshu.fullname" . }}"}[5m]) > 0.1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High LLM error rate"
              description: "LLM error rate > 10% for 5 minutes (current: {{ "{{" }} $value | humanizePercentage {{ "}}" }})"

          - alert: LingshuFederationNodeDown
            expr: |
              ls_federation_nodes_active{job="{{ include "lingshu.fullname" . }}"} 
              < on(instance) ls_federation_nodes_expected{job="{{ include "lingshu.fullname" . }}"}
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Federation node missing"
              description: "Active federation nodes < expected nodes"

          - alert: LingshuHighLatency
            expr: |
              histogram_quantile(0.95, rate(ls_http_requests_duration_seconds_bucket{job="{{ include "lingshu.fullname" . }}"}[5m])) > 5
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "High P95 request latency"
              description: "P95 latency > 5s for 3 minutes (current: {{ "{{" }} $value | humanizeDuration {{ "}}" }})"

          - alert: LingshuSessionsExhausted
            expr: |
              ls_sessions_active{job="{{ include "lingshu.fullname" . }}"} > 10000
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Active sessions approaching limit"
              description: "Active sessions > 10,000 (current: {{ "{{" }} $value {{ "}}" }})"
{{- end }}
