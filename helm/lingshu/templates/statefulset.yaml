{{- if eq .Values.workloadType "StatefulSet" }}
{{- $fullname := include "lingshu.fullname" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "lingshu.labels" . | nindent 4 }}
spec:
  serviceName: {{ $fullname }}-federation
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      {{- include "lingshu.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "lingshu.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "lingshu.serviceAccountName" . }}
      terminationGracePeriodSeconds: 60
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "lingshu.selectorLabels" . | nindent 20 }}
      {{- end }}

      {{- if .Values.pluginMarket.enabled }}
      initContainers:
        - name: plugin-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              INSTALL_DIR="{{ .Values.pluginMarket.installDir }}"
              mkdir -p "$INSTALL_DIR"
              echo "Initializing plugin directory at $INSTALL_DIR"
          volumeMounts:
            - name: plugins
              mountPath: {{ .Values.pluginMarket.installDir }}
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 32Mi
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.httpPort }}
              name: http
            - containerPort: {{ .Values.service.clusterPort }}
              name: cluster
            {{- if .Values.federation.enabled }}
            - containerPort: {{ .Values.federation.port }}
              name: federation
              protocol: TCP
            {{- end }}
            {{- if .Values.beef.enabled }}
            - containerPort: {{ .Values.beef.port }}
              name: beef
              protocol: TCP
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ $fullname }}-config
          
          env:
            - name: LS_ENV
              value: {{ .Values.env.LS_ENV }}
            - name: LS_LOG_LEVEL
              value: {{ .Values.env.LS_LOG_LEVEL }}
            - name: LS_CLUSTER_ADDR
              value: {{ .Values.env.LS_CLUSTER_ADDR }}
            {{- if .Values.federation.enabled }}
            - name: LS_FEDERATION_PORT
              value: {{ .Values.federation.port | quote }}
            - name: LS_FEDERATION_ENABLED
              value: "true"
            - name: LS_CLUSTER_NAME
              value: {{ .Values.federation.clusterName | quote }}
            - name: LS_FEDERATION_TOPOLOGY
              value: {{ .Values.federation.topology | quote }}
            - name: LS_FEDERATION_DISCOVERY
              value: {{ .Values.federation.discovery | quote }}
            - name: LS_REPLICATION_STRATEGY
              value: {{ .Values.federation.replicationStrategy | quote }}
            - name: LS_FEDERATION_HEARTBEAT_INTERVAL
              value: {{ .Values.federation.heartbeat.intervalSeconds | quote }}
            - name: LS_FEDERATION_HEARTBEAT_TIMEOUT
              value: {{ .Values.federation.heartbeat.timeoutSeconds | quote }}
            - name: LS_FEDERATION_MAX_MSG_SIZE
              value: {{ .Values.federation.maxMessageSize | quote }}
            - name: LS_CLUSTER_SEED
              value: "{{ $fullname }}-federation"
            - name: LS_NODE_ROLE
              value: {{ .Values.federation.nodeRole | quote }}
            {{- if eq .Values.federation.topology "HubSpoke" }}
            - name: LS_FEDERATION_HUB_COUNT
              value: {{ .Values.federation.hubCount | quote }}
            {{- end }}
            {{- if eq .Values.workloadType "StatefulSet" }}
            - name: LS_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LS_POD_ORDINAL
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
            {{- end }}
            {{- end }}
            {{- if .Values.secrets.openai_api_key }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-secrets
                  key: openai_api_key
            {{- end }}
            {{- if .Values.secrets.anthropic_api_key }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-secrets
                  key: anthropic_api_key
            {{- end }}
            {{- if .Values.secrets.groq_api_key }}
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-secrets
                  key: groq_api_key
            {{- end }}
            {{- if .Values.secrets.credential_master_key }}
            - name: LINGSHU_CREDENTIAL_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-secrets
                  key: credential_master_key
            {{- end }}
            {{- if .Values.pluginMarket.enabled }}
            - name: LS_PLUGIN_MARKET_ENABLED
              value: "true"
            - name: LS_PLUGIN_INSTALL_DIR
              value: {{ .Values.pluginMarket.installDir | quote }}
            - name: LS_PLUGIN_AUTO_DISCOVER
              value: {{ .Values.pluginMarket.autoDiscover | quote }}
            - name: LS_PLUGIN_REFRESH_INTERVAL
              value: {{ .Values.pluginMarket.refreshInterval | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /var/lib/lingshu
            {{- end }}
            {{- if and .Values.pluginMarket.enabled .Values.pluginMarket.persistence.enabled }}
            - name: plugins
              mountPath: {{ .Values.pluginMarket.installDir }}
            {{- end }}
            {{- if .Values.pluginMarket.enabled }}
            - name: config
              mountPath: /etc/lingshu/plugin.yaml
              subPath: plugin.yaml
            - name: config
              mountPath: /etc/lingshu/marketplace-config.yaml
              subPath: marketplace-config.yaml
            {{- end }}
  volumeClaimTemplates:
    {{- if .Values.persistence.enabled }}
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
    {{- end }}
    {{- if and .Values.pluginMarket.enabled .Values.pluginMarket.persistence.enabled }}
    - metadata:
        name: plugins
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: {{ .Values.pluginMarket.persistence.size }}
        {{- if .Values.pluginMarket.persistence.storageClass }}
        storageClassName: {{ .Values.pluginMarket.persistence.storageClass }}
        {{- end }}
    {{- end }}
  {{- if not .Values.pluginMarket.enabled }}
  volumes:
    - name: config
      configMap:
        name: {{ $fullname }}-plugin-config
  {{- end }}
{{- end }}
