{{- if .Values.federation.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lingshu.fullname" . }}-federation
  labels:
    {{- include "lingshu.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "lingshu.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.service.httpPort }}
          protocol: TCP
        - port: {{ .Values.service.clusterPort }}
          protocol: TCP
        - port: {{ .Values.federation.port }}
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              {{- include "lingshu.selectorLabels" . | nindent 14 }}
        {{- if .Values.monitoring.enabled }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        {{- end }}
  egress:
    - {}
{{- end }}
