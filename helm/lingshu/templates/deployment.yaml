apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lingshu.fullname" . }}
  labels:
    {{- include "lingshu.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "lingshu.selectorLabels" . | nindent 6 }}
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "lingshu.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "lingshu.serviceAccountName" . }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.httpPort }}
              name: http
            - containerPort: {{ .Values.service.clusterPort }}
              name: cluster
            {{- if .Values.federation.enabled }}
            - containerPort: {{ .Values.federation.port }}
              name: federation
              protocol: TCP
            {{- end }}
          env:
            - name: LS_ENV
              value: {{ .Values.env.LS_ENV }}
            - name: LS_LOG_LEVEL
              value: {{ .Values.env.LS_LOG_LEVEL }}
            - name: LS_CLUSTER_ADDR
              value: {{ .Values.env.LS_CLUSTER_ADDR }}
            {{- if .Values.federation.enabled }}
            - name: LS_FEDERATION_PORT
              value: {{ .Values.federation.port | quote }}
            - name: LS_FEDERATION_ENABLED
              value: "true"
            - name: LS_CLUSTER_NAME
              value: {{ .Values.federation.clusterName | quote }}
            - name: LS_CLUSTER_SEED
              value: {{ .Values.federation.seedService | quote }}
            {{- end }}
            {{- if .Values.secrets.openai_api_key }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lingshu.fullname" . }}-secrets
                  key: openai_api_key
            {{- end }}
            {{- if .Values.secrets.anthropic_api_key }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lingshu.fullname" . }}-secrets
                  key: anthropic_api_key
            {{- end }}
            {{- if .Values.secrets.groq_api_key }}
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lingshu.fullname" . }}-secrets
                  key: groq_api_key
            {{- end }}
            {{- if .Values.secrets.credential_master_key }}
            - name: LINGSHU_CREDENTIAL_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lingshu.fullname" . }}-secrets
                  key: credential_master_key
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /var/lib/lingshu
            {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "lingshu.fullname" . }}-data
        {{- end }}
