apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lingshu.fullname" . }}
  labels:
    {{- include "lingshu.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "lingshu.selectorLabels" . | nindent 6 }}
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "lingshu.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "lingshu.serviceAccountName" . }}
      terminationGracePeriodSeconds: 60
      {{- if .Values.pluginMarket.enabled }}
      initContainers:
        - name: plugin-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              INSTALL_DIR="{{ .Values.pluginMarket.installDir }}"
              mkdir -p "$INSTALL_DIR"
              echo "Initializing plugin directory at $INSTALL_DIR"
              {{- if .Values.pluginMarket.defaultPlugins }}
              echo "Default plugins configured for first-run download:"
              {{- range $name, $version := .Values.pluginMarket.defaultPlugins }}
              echo "  - {{ $name }}@{{ $version }}"
              {{- end }}
              {{- end }}
          volumeMounts:
            - name: plugins
              mountPath: {{ .Values.pluginMarket.installDir }}
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 32Mi
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.httpPort }}
              name: http
            - containerPort: {{ .Values.service.clusterPort }}
              name: cluster
            {{- if .Values.federation.enabled }}
            - containerPort: {{ .Values.federation.port }}
              name: federation
              protocol: TCP
            {{- end }}
          env:
            - name: LS_ENV
              value: {{ .Values.env.LS_ENV }}
            - name: LS_LOG_LEVEL
              value: {{ .Values.env.LS_LOG_LEVEL }}
            - name: LS_CLUSTER_ADDR
              value: {{ .Values.env.LS_CLUSTER_ADDR }}
            {{- if .Values.federation.enabled }}
            - name: LS_FEDERATION_PORT
              value: {{ .Values.federation.port | quote }}
            - name: LS_FEDERATION_ENABLED
              value: "true"
            - name: LS_CLUSTER_NAME
              value: {{ .Values.federation.clusterName | quote }}
            - name: LS_CLUSTER_SEED
              value: {{ .Values.federation.seedService | quote }}
            {{- end }}
            {{- if .Values.secrets.openai_api_key }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lingshu.fullname" . }}-secrets
                  key: openai_api_key
            {{- end }}
            {{- if .Values.secrets.anthropic_api_key }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lingshu.fullname" . }}-secrets
                  key: anthropic_api_key
            {{- end }}
            {{- if .Values.secrets.groq_api_key }}
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lingshu.fullname" . }}-secrets
                  key: groq_api_key
            {{- end }}
            {{- if .Values.secrets.credential_master_key }}
            - name: LINGSHU_CREDENTIAL_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lingshu.fullname" . }}-secrets
                  key: credential_master_key
            {{- end }}
            {{- if .Values.pluginMarket.enabled }}
            - name: LS_PLUGIN_MARKET_ENABLED
              value: "true"
            - name: LS_PLUGIN_INSTALL_DIR
              value: {{ .Values.pluginMarket.installDir | quote }}
            - name: LS_PLUGIN_AUTO_DISCOVER
              value: {{ .Values.pluginMarket.autoDiscover | quote }}
            - name: LS_PLUGIN_REFRESH_INTERVAL
              value: {{ .Values.pluginMarket.refreshInterval | quote }}
            {{- if .Values.pluginMarket.hotReload.enabled }}
            - name: LS_PLUGIN_HOT_RELOAD_ENABLED
              value: "true"
            - name: LS_PLUGIN_HOT_RELOAD_WATCH_DIR
              value: {{ .Values.pluginMarket.hotReload.watchDir | quote }}
            - name: LS_PLUGIN_HOT_RELOAD_DEBOUNCE_SECS
              value: {{ .Values.pluginMarket.hotReload.debounceSeconds | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /var/lib/lingshu
            {{- end }}
            {{- if and .Values.pluginMarket.enabled .Values.pluginMarket.persistence.enabled }}
            - name: plugins
              mountPath: {{ .Values.pluginMarket.installDir }}
            {{- end }}
            {{- if .Values.pluginMarket.enabled }}
            - name: config
              mountPath: /etc/lingshu/plugin.yaml
              subPath: plugin.yaml
            - name: config
              mountPath: /etc/lingshu/marketplace-config.yaml
              subPath: marketplace-config.yaml
            {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "lingshu.fullname" . }}-data
        {{- end }}
        {{- if and .Values.pluginMarket.enabled .Values.pluginMarket.persistence.enabled }}
        - name: plugins
          persistentVolumeClaim:
            claimName: {{ include "lingshu.fullname" . }}-plugins
        {{- else if .Values.pluginMarket.enabled }}
        - name: plugins
          emptyDir: {}
        {{- end }}
        {{- if .Values.pluginMarket.enabled }}
        - name: config
          configMap:
            name: {{ include "lingshu.fullname" . }}-plugin-config
        {{- end }}
