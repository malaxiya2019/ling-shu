{{- if or .Values.secrets.openai_api_key .Values.secrets.anthropic_api_key .Values.secrets.groq_api_key .Values.secrets.credential_master_key }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lingshu.fullname" . }}-secrets
  labels:
    {{- include "lingshu.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.openai_api_key }}
  openai_api_key: {{ .Values.secrets.openai_api_key | b64enc }}
  {{- end }}
  {{- if .Values.secrets.anthropic_api_key }}
  anthropic_api_key: {{ .Values.secrets.anthropic_api_key | b64enc }}
  {{- end }}
  {{- if .Values.secrets.groq_api_key }}
  groq_api_key: {{ .Values.secrets.groq_api_key | b64enc }}
  {{- end }}
  {{- if .Values.secrets.credential_master_key }}
  credential_master_key: {{ .Values.secrets.credential_master_key | b64enc }}
  {{- end }}
{{- end }}
