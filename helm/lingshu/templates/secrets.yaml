apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lingshu.fullname" . }}-secrets
  labels:
    {{- include "lingshu.labels" . | nindent 4 }}
type: Opaque
stringData:
  openai-api-key: "{{ .Values.env.OPENAI_API_KEY }}"
  anthropic-api-key: "{{ .Values.env.ANTHROPIC_API_KEY }}"
  master-key: "{{ .Values.env.LINGSHU_CREDENTIAL_MASTER_KEY | default (randAlphaNum 32) }}"
