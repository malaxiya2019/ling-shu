{{- if .Values.federation.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lingshu.fullname" . }}-federation
  labels:
    {{- include "lingshu.labels" . | nindent 4 }}
  annotations:
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.federation.port }}
      targetPort: federation
      name: federation
  selector:
    {{- include "lingshu.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lingshu.fullname" . }}-headless
  labels:
    {{- include "lingshu.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.httpPort }}
      targetPort: http
      name: http
    - port: {{ .Values.service.clusterPort }}
      targetPort: cluster
      name: cluster
    {{- if .Values.federation.enabled }}
    - port: {{ .Values.federation.port }}
      targetPort: federation
      name: federation
    {{- end }}
  selector:
    {{- include "lingshu.selectorLabels" . | nindent 4 }}
{{- end }}
