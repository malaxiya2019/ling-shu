# ── Lingshu Helm Chart Values ────────────────────────
# 生产级 AI Agent Runtime 部署配置

# ── 镜像配置 ──
image:
  repository: lingshu/agent-runtime
  tag: latest
  pullPolicy: Always

# ── 副本数 ──
replicaCount: 2

# ── 服务配置 ──
service:
  type: ClusterIP
  port: 8080
  metricsPort: 9090

# ── 资源配置 ──
resources:
  server:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  worker:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "8"
      memory: "16Gi"

# ── 环境变量 ──
env:
  LS_ENV: prod
  LS_LOG_LEVEL: info
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""

# ── 存储配置 ──
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

# ── Ingress ──
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: lingshu.local
      paths:
        - path: /
          pathType: Prefix

# ── 数据库 ──
postgresql:
  enabled: true
  auth:
    database: lingshu
    username: lingshu
    password: lingshu_prod

redis:
  enabled: true
  auth:
    enabled: true
    password: redis_prod

# ── Worker ──
worker:
  enabled: true
  replicaCount: 2

# ── 可观测性 ──
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s

# ── 自动扩缩容 ──
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# ── 节点选择 ──
nodeSelector: {}
tolerations: []
affinity: {}
