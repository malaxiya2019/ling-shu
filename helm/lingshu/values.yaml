# ── LingShu Helm Values ──

replicaCount: 3

image:
  repository: ghcr.io/malaxiya2019/lingshu
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  httpPort: 8080
  clusterPort: 9090

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: api.lingshu.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: lingshu-tls
      hosts:
        - api.lingshu.local

federation:
  enabled: true
  port: 9550
  clusterName: lingshu-cluster
  seedService: lingshu-federation

resources:
  limits:
    cpu: "2"
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  LS_ENV: prod
  LS_LOG_LEVEL: info
  LS_CLUSTER_ADDR: "0.0.0.0:9090"

secrets:
  openai_api_key: ""
  anthropic_api_key: ""
  groq_api_key: ""
  credential_master_key: "change-me-in-production"

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

nodeSelector: {}

tolerations: []

affinity: {}

# ── Plugin Market ──
pluginMarket:
  enabled: true
  installDir: /var/lib/lingshu/plugins
  autoDiscover: "true"
  refreshInterval: 300
  maxPlugins: 100
  verifyChecksums: true
  allowLocalSources: false
  sources:
    - "lingshu-org/lingshu-plugins"
  defaultPlugins: {}
    # example-plugin: "1.0.0"
  hotReload:
    enabled: false
    watchDir: /var/lib/lingshu/plugins
    debounceSeconds: 2
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""

# ── BeEF Security Testing Plugin ──
beef:
  enabled: true
  port: 3000
  rubyBin: /usr/bin/ruby
  installDir: /opt/beef
  healthCheck:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 15
  resources:
    limits:
      cpu: "1"
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 128Mi
