[workspace]
resolver = "2"

members = [
    "app",
    "core",
    "traits",
    "runtime",
    "eventbus",
    "security",
    "config",
    "storage",
    "database",
    "observability",
    "backends",
    "plugin",
]

[workspace.package]
version = "1.0.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Lingshu Agent System — LSCode v1.0.0"

[workspace.dependencies]
jsonwebtoken = "9"
serde_yaml = "0.9"
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "v7", "serde"] }
chrono = { version = "0.4", features = ["serde", "clock"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
thiserror = "2"

[profile.release]
opt-level = 3
