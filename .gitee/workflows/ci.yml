name: CI
displayName: Lingshu CI — v5.0 (agent-device + SimpleCAD)

on:
  push:
    branches:
      - main
      - develop
    tags:
      - v*
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  lint:
    name: Lint (clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: gitee/checkout@v1
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          rustup component add rustfmt clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libssl-dev pkg-config
      - name: Cache cargo
        uses: gitee/cache@v1
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo fmt
        run: cargo fmt --all --check
      - name: cargo clippy (strict)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: cargo doc (check broken links)
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D rustdoc::broken-intra-doc-links

  test:
    name: Test (unit + doc + plugins)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lingshu_test
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: gitee/checkout@v1
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libssl-dev pkg-config
      # ── 安装 agent-device 所需依赖 ──
      - name: Install Node.js + agent-device
        run: |
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo bash -
          sudo apt-get install -y nodejs
          npm install -g agent-device
          agent-device --version
      # ── 安装 SimpleCAD 所需依赖 ──
      - name: Install Python + SimpleCADAPI
        run: |
          sudo apt-get install -y python3 python3-pip
          pip3 install simplecadapi mcp
          python3 -c "import simplecadapi; print('simplecadapi', simplecadapi.__version__)"
      - name: Cache cargo
        uses: gitee/cache@v1
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo test (lib — all plugins)
        run: cargo test --workspace --lib --all-features
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lingshu_test
      - name: cargo test (doc)
        run: cargo test --workspace --doc --all-features
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lingshu_test
      # ── 集成测试: agent-device ──
      - name: Integration test — agent-device MCP
        run: cargo test -p lingshu-agent-device-plugin --test integration_test -- --nocapture
        continue-on-error: true
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lingshu_test
      # ── 集成测试: SimpleCAD MCP ──
      - name: Integration test — SimpleCAD MCP
        run: |
          python3 -m simplecad_mcp.server &
          MCP_PID=$!
          sleep 3
          curl -sf http://127.0.0.1:8080/health 2>/dev/null || echo "MCP health check skipped (stdio mode)"
          kill $MCP_PID 2>/dev/null || true
        continue-on-error: true

  build:
    name: Build (release — all plugins)
    runs-on: ubuntu-latest
    steps:
      - uses: gitee/checkout@v1
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libssl-dev pkg-config
      - name: Cache cargo
        uses: gitee/cache@v1
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo build (release)
        run: cargo build --release --all-features
        env:
          RUSTFLAGS: ""
      - name: Upload binary
        uses: gitee/upload_artifact@v1
        with:
          name: lingshu-x86_64-linux
          path: target/release/lingshu
      - name: Smoke test
        run: |
          ./target/release/lingshu --headless --addr 127.0.0.1:8090 &
          SERVER_PID=$!
          sleep 2
          curl -sf http://127.0.0.1:8090/health | grep -q '"status":"ok"' && echo "✅ Health check passed"
          kill $SERVER_PID 2>/dev/null || true

  plugin-test:
    name: Plugins — agent-device + SimpleCAD
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: gitee/checkout@v1
      - name: Download binary
        uses: gitee/download_artifact@v1
        with:
          name: lingshu-x86_64-linux
          path: ./target/release/
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      # ── agent-device 运行时测试 ──
      - name: Install Node.js + agent-device
        run: |
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo bash -
          sudo apt-get install -y nodejs
          npm install -g agent-device
          echo "agent-device $(agent-device --version)"
      - name: Test — agent-device MCP tools discovery
        run: |
          agent-device mcp &
          MCP_PID=$!
          sleep 3
          echo "agent-device MCP 启动成功 (PID=$MCP_PID)"
          kill $MCP_PID 2>/dev/null || true
      # ── SimpleCAD 运行时测试 ──
      - name: Install Python + SimpleCADAPI
        run: |
          sudo apt-get install -y python3 python3-pip
          pip3 install simplecadapi mcp
          python3 -c "
import simplecadapi as scad
from simplecadapi import ql as Q
# 创建基本体
base = scad.make_box_rsolid(60.0, 36.0, 8.0)
hole = scad.make_cylinder_rsolid(5.0, 14.0)
part = scad.cut_rsolid(base, hole)
tag = scad.apply_tag(part, 'test_part')
print(f'✅ SimpleCADAPI 测试: volume={part.get_volume():.2f}, faces={len(part.get_faces())}')
"
      - name: Test — ling-shu binary plugin loading
        run: |
          ./target/release/lingshu --headless --addr 127.0.0.1:8091 &
          SERVER_PID=$!
          sleep 3
          curl -sf http://127.0.0.1:8091/plugins | python3 -c "
import json, sys
data = json.load(sys.stdin)
print(f'插件数: {len(data)}')
for p in data:
    print(f'  - {p.get(\"name\", \"?\")} (v{p.get(\"version\", \"?\")})')
"
          kill $SERVER_PID 2>/dev/null || true

  webui:
    name: WebUI (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: gitee/checkout@v1
      - name: Install Rust + wasm target
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          rustup target add wasm32-unknown-unknown
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Cache cargo
        uses: gitee/cache@v1
        with:
          path: ~/.cargo
          key: cargo-webui-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Install trunk
        run: |
          wget -qO- https://github.com/trunk-rs/trunk/releases/download/v0.21.8/trunk-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin
      - name: Build WebUI WASM
        run: cd webui && trunk build --release
      - name: Upload WebUI dist
        uses: gitee/upload_artifact@v1
        with:
          name: lingshu-webui-dist
          path: webui/dist

  docker:
    name: Docker (multi-arch + plugins)
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - build
      - plugin-test
      - webui
    if: gitee.ref == 'refs/heads/main' || startsWith(gitee.ref, 'refs/tags/v')
    steps:
      - uses: gitee/checkout@v1
      - name: Set up QEMU
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged tonistiigi/binfmt --install all
      - name: Set up Docker Buildx
        run: docker buildx create --name multiarch --use
      - name: Login to Gitee Container Registry
        run: |
          echo "${{ secrets.GITEE_TOKEN }}" | docker login gitee.com -u "${{ gitee.repository_owner }}" --password-stdin
      - name: Docker meta
        id: meta
        uses: gitee/docker_meta@v1
        with:
          images: gitee.com/${{ gitee.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
      - name: Build and push
        uses: gitee/docker_build_push@v1
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: gitee/checkout@v1
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Cache cargo
        uses: gitee/cache@v1
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Install security tools
        run: |
          cargo install cargo-audit
          cargo install cargo-deny
      - name: cargo audit
        run: cargo audit || true
      - name: cargo deny
        run: cargo deny check || true
