name: CI
displayName: Lingshu CI

on:
  push:
    branches:
      - main
      - develop
    tags:
      - v*
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: gitee/checkout@v1
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          rustup component add rustfmt clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Cache cargo
        uses: gitee/cache@v1
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -A clippy::all

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lingshu_test
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: gitee/checkout@v1
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Cache cargo
        uses: gitee/cache@v1
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo test --all --all-features
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lingshu_test
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D rustdoc::broken-intra-doc-links

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: gitee/checkout@v1
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Cache cargo
        uses: gitee/cache@v1
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release --all-features
      - name: Upload binary
        uses: gitee/upload_artifact@v1
        with:
          name: lingshu-x86_64-linux
          path: target/release/lingshu
      - name: Smoke test
        run: |
          ./target/release/lingshu --headless --addr 127.0.0.1:8090 &
          SERVER_PID=$!
          sleep 2
          curl -sf http://127.0.0.1:8090/health | grep -q '"status":"ok"' && echo "Health check passed"
          kill $SERVER_PID 2>/dev/null || true

  webui:
    name: WebUI (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: gitee/checkout@v1
      - name: Install Rust + wasm target
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          rustup target add wasm32-unknown-unknown
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Cache cargo
        uses: gitee/cache@v1
        with:
          path: ~/.cargo
          key: cargo-webui-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Install trunk
        run: |
          wget -qO- https://github.com/trunk-rs/trunk/releases/download/v0.21.8/trunk-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin
      - name: Build WebUI WASM
        run: cd webui && trunk build --release
      - name: Upload WebUI dist
        uses: gitee/upload_artifact@v1
        with:
          name: lingshu-webui-dist
          path: webui/dist

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - build
      - webui
    if: gitee.ref == 'refs/heads/main' || startsWith(gitee.ref, 'refs/tags/v')
    steps:
      - uses: gitee/checkout@v1
      - name: Set up QEMU
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged tonistiigi/binfmt --install all
      - name: Set up Docker Buildx
        run: |
          docker buildx create --name multiarch --use
      - name: Login to Gitee Container Registry
        run: |
          echo "${{ secrets.GITEE_TOKEN }}" | docker login gitee.com -u "${{ gitee.repository_owner }}" --password-stdin
      - name: Docker meta
        id: meta
        uses: gitee/docker_meta@v1
        with:
          images: gitee.com/${{ gitee.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
      - name: Build and push
        uses: gitee/docker_build_push@v1
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: gitee/checkout@v1
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Cache cargo
        uses: gitee/cache@v1
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Install security tools
        run: |
          cargo install cargo-audit
          cargo install cargo-deny
      - name: Run cargo audit
        run: cargo audit || true
      - name: Run cargo deny
        run: cargo deny check || true
