[package]
name = "lingshu-tests"
version.workspace = true
edition.workspace = true
description = "Lingshu integration tests — cross-crate end-to-end verification"
publish = false

[dependencies]
lingshu-core = { path = "../core" }
lingshu-traits = { path = "../traits" }
