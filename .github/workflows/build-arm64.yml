name: Build ARM64 Binary

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target architecture'
        required: true
        default: 'aarch64-unknown-linux-gnu'
        type: choice
        options:
          - aarch64-unknown-linux-gnu
          - aarch64-linux-android
      features:
        description: 'Cargo features (comma-separated, empty=minimal)'
        required: false
        default: ''
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update -o Acquire::http::Timeout=30 && sudo apt-get install -y protobuf-compiler

      - name: Install cross-compilation deps (Linux ARM64)
        if: inputs.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross pkg-config libssl-dev
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> $GITHUB_ENV

      - name: Install Android NDK (for Termux target)
        if: inputs.target == 'aarch64-linux-android'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27-linux.zip
          unzip -q android-ndk-r27-linux.zip
          NDK_DIR=$(ls -d android-ndk-* 2>/dev/null | head -1)
          echo "NDK installed: $NDK_DIR"
          export NDK="$PWD/$NDK_DIR"
          export TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          export PATH="$TOOLCHAIN/bin:$PATH"
          echo "$TOOLCHAIN/bin" >> $GITHUB_PATH
          
          # Find the clang wrapper and set cross-compilation env vars
          CLANG=$(ls "$TOOLCHAIN/bin"/aarch64-linux-android*-clang | head -1)
          echo "Using clang: $CLANG"
          echo "CC_aarch64_linux_android=$CLANG" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=llvm-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$CLANG" >> $GITHUB_ENV
          
          # Create gcc symlink for any build scripts that check for it
          for CL in "$TOOLCHAIN/bin"/aarch64-linux-android*-clang; do
            BASE=$(basename "$CL" | sed 's/-clang//')
            ln -sf "$CL" "$TOOLCHAIN/bin/${BASE}-gcc" 2>/dev/null || true
          done
          
          ls "$TOOLCHAIN/bin"/aarch64-linux-android* | head -10

      - name: Build binary
        run: |
          FEATURES="${{ inputs.features }}"
          
          if [ -z "$FEATURES" ]; then
            FEATURES="audit-sqlite"
          fi
          
          echo "Building for ${{ inputs.target }} with features: ${FEATURES}"
          echo "CC: ${{ env.CC_aarch64_linux_android }}"
          echo "AR: ${{ env.AR_aarch64_linux_android }}"
          
          cargo build --release -p lingshu \
            --target ${{ inputs.target }} \
            --no-default-features \
            --features "${FEATURES}"

      - name: Package binary
        run: |
          mkdir -p dist/lingshu
          if [ "${{ inputs.target }}" = "aarch64-linux-android" ]; then
            cp target/aarch64-linux-android/release/lingshu dist/lingshu/
          else
            cp target/aarch64-unknown-linux-gnu/release/lingshu dist/lingshu/
          fi
          cp .env.example README.md LICENSE dist/lingshu/ 2>/dev/null || true
          cd dist
          ARCH_NAME="${{ inputs.target }}"
          tar czf ../lingshu-${ARCH_NAME}.tar.gz lingshu/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lingshu-${{ inputs.target }}
          path: lingshu-${{ inputs.target }}.tar.gz
