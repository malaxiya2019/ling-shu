name: Build ARM64 Binary

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target architecture'
        required: true
        default: 'aarch64-unknown-linux-gnu'
        type: choice
        options:
          - aarch64-unknown-linux-gnu
          - aarch64-linux-android
      features:
        description: 'Cargo features (comma-separated, empty=minimal)'
        required: false
        default: ''
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update -o Acquire::http::Timeout=30 && sudo apt-get install -y protobuf-compiler

      - name: Install cross-compilation deps (Linux ARM64)
        if: inputs.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross pkg-config libssl-dev
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Install Android NDK (for Termux target)
        if: inputs.target == 'aarch64-linux-android'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27-linux.zip
          unzip -q android-ndk-r27-linux.zip
          NDK_DIR=$(ls -d android-ndk-* 2>/dev/null | head -1)
          echo "NDK installed: $NDK_DIR"
          TOOLCHAIN="$PWD/$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "$TOOLCHAIN" >> $GITHUB_PATH
          # Create gcc symlinks for any tools that need them
          for CLANG in "$TOOLCHAIN"/aarch64-linux-android*-clang; do
            BASE=$(basename "$CLANG" | sed 's/-clang//')
            ln -sf "$CLANG" "$TOOLCHAIN/${BASE}-gcc" 2>/dev/null || true
          done
          ls "$TOOLCHAIN"/aarch64-linux-android* | head -10
          echo "AARCH64_LINUX_ANDROID_LINKER=$(ls "$TOOLCHAIN"/aarch64-linux-android*-clang | head -1)" >> $GITHUB_ENV

      - name: Build binary (minimal features to avoid OpenSSL)
        run: |
          FEATURES="${{ inputs.features }}"
          
          # For Android, use minimal features to avoid OpenSSL native-tls issues
          if [ "${{ inputs.target }}" = "aarch64-linux-android" ]; then
            if [ -z "$FEATURES" ]; then
              # Minimal build: no default features, just audit-sqlite
              FEATURES="audit-sqlite"
            fi
            echo "Building with features: ${FEATURES}"
            echo "Using linker: $AARCH64_LINUX_ANDROID_LINKER"
            export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$AARCH64_LINUX_ANDROID_LINKER"
            cargo build --release -p lingshu --target aarch64-linux-android --no-default-features --features "${FEATURES}"
          else
            # Linux ARM64: use system OpenSSL
            if [ -z "$FEATURES" ]; then
              FEATURES="audit-sqlite"
            fi
            cargo build --release -p lingshu --target aarch64-unknown-linux-gnu --no-default-features --features "${FEATURES}"
          fi

      - name: Package binary
        run: |
          mkdir -p dist/lingshu
          if [ "${{ inputs.target }}" = "aarch64-linux-android" ]; then
            cp target/aarch64-linux-android/release/lingshu dist/lingshu/
          else
            cp target/aarch64-unknown-linux-gnu/release/lingshu dist/lingshu/
          fi
          cp .env.example README.md LICENSE dist/lingshu/ 2>/dev/null || true
          cd dist
          ARCH_NAME="${{ inputs.target }}"
          tar czf ../lingshu-${ARCH_NAME}.tar.gz lingshu/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lingshu-${{ inputs.target }}
          path: lingshu-${{ inputs.target }}.tar.gz
