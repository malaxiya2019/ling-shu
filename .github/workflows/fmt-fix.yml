name: Format Fix

on:
  workflow_dispatch:
  push:
    branches: [fmt-fix-trigger]

jobs:
  fmt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN || github.token }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all
      - name: Commit formatting changes
        run: |
          git config user.name "ling-shu-bot"
          git config user.email "ling-shu-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "style: cargo fmt --all"
          git push
