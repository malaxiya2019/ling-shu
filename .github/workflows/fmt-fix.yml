name: Format Fix

on:
  workflow_dispatch:

jobs:
  fmt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all
      - name: Commit and push formatting changes
        run: |
          git config user.name "ling-shu-bot"
          git config user.email "ling-shu-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "style: cargo fmt --all"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push
