name: Build External Dependencies

on:
  workflow_dispatch:
    inputs:
      python-version:
        default: "3.12"
        type: choice
        options: ["3.11", "3.12"]
      extras:
        default: "api"

permissions:
  contents: write

jobs:
  build-watch-skill:
    name: watch-skill ${{ matrix.platform }}
    strategy:
      matrix:
        include:
          - platform: x86_64
            pip_platform: manylinux2014_x86_64
          - platform: aarch64
            pip_platform: manylinux2014_aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ github.event.inputs.python-version || '3.12' }}

      - name: Clone & build watch-skill
        run: |
          mkdir -p /tmp/watch-skill
          cd /tmp/watch-skill
          git clone --depth 1 https://github.com/oxbshw/watch-skill.git .
          uv build
          EXTRAS="${{ github.event.inputs.extras || 'api' }}"
          for extra in $(echo "$EXTRAS" | tr ',' ' '); do
            uv sync --no-dev --extra "$extra"
          done
          uv pip freeze | grep -v "^watch-skill @ " > /tmp/requirements.txt
          echo "=== $(wc -l < /tmp/requirements.txt) locked deps ==="

      - name: Download ${{ matrix.pip_platform }} wheels
        run: |
          mkdir -p /tmp/wheels
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            pip download "$pkg" \
              --platform ${{ matrix.pip_platform }} \
              --only-binary :all: \
              --dest /tmp/wheels \
              --python-version ${{ github.event.inputs.python-version || '3.12' }} \
              --no-deps 2>&1 || echo "[SKIP] $pkg"
          done < /tmp/requirements.txt

      - name: Rename for Termux (aarch64 only)
        if: matrix.platform == 'aarch64'
        run: |
          cd /tmp/wheels
          for whl in *.whl; do
            [ -f "$whl" ] || continue
            newname=$(echo "$whl" | sed -E 's/(manylinux|musllinux)[^.]*([.][^.]*)?/linux/g')
            [ "$whl" != "$newname" ] && mv -v "$whl" "$newname" || true
          done

      - name: Bundle
        run: |
          cp /tmp/watch-skill/dist/*.whl /tmp/wheels/ 2>/dev/null || true
          cat > /tmp/wheels/install-termux.sh << 'SCRIPT'
          #!/data/data/com.termux/files/usr/bin/bash
          set -euo pipefail
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          pip install --no-index --find-links "$DIR" watch-skill
          echo "Done. Try: watch-skill doctor"
          SCRIPT
          chmod +x /tmp/wheels/install-termux.sh
          tar czf ${{ github.workspace }}/watch-skill-${{ matrix.platform }}.tar.gz -C /tmp/wheels .
          ls -lh ${{ github.workspace }}/watch-skill-${{ matrix.platform }}.tar.gz

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: watch-skill-${{ matrix.platform }}
          path: watch-skill-${{ matrix.platform }}.tar.gz
