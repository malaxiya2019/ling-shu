name: Build External Dependencies

# 构建 LingShu 所需的外部依赖（watch-skill）。
# 在 CI 上先安装所有依赖，再逐一下载 aarch64 manylinux wheels，
# 打包供 Termux 离线安装。

on:
  workflow_dispatch:
    inputs:
      python-version:
        description: "Python version"
        default: "3.12"
        type: choice
        options: ["3.11", "3.12"]
      extras:
        description: "Feature extras (comma-separated)"
        default: "api"

permissions:
  contents: write

jobs:
  build-watch-skill:
    name: Bundle watch-skill wheels
    strategy:
      matrix:
        include:
          - platform: x86_64
            runner: ubuntu-latest
            pip_platform: manylinux2014_x86_64
          - platform: aarch64
            runner: ubuntu-latest
            pip_platform: manylinux2014_aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ github.event.inputs.python-version || '3.12' }}

      - name: Checkout and build watch-skill
        run: |
          git clone --depth 1 https://github.com/oxbshw/watch-skill.git /tmp/watch-skill
          cd /tmp/watch-skill
          uv build

      - name: Install all deps to get locked dependency list
        run: |
          cd /tmp/watch-skill
          EXTRAS="${{ github.event.inputs.extras || 'api' }}"
          # 安装所有依赖
          for extra in $(echo "$EXTRAS" | tr ',' ' '); do
            uv sync --no-dev --extra "$extra"
          done
          # 导出 flat 依赖列表 (排除 watch-skill 自身)
          uv pip freeze | grep -v "^watch-skill @ " | grep -v "^-e " > /tmp/requirements.txt
          echo "=== Locked deps ==="
          cat /tmp/requirements.txt

      - name: Download aarch64 wheels
        run: |
          mkdir -p dist/deps
          PLATFORM="${{ matrix.pip_platform }}"
          echo "Downloading for platform: $PLATFORM"
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            echo "  → $pkg"
            pip download \
              "$pkg" \
              --platform "$PLATFORM" \
              --only-binary :all: \
              --dest dist/deps/ \
              --python-version ${{ github.event.inputs.python-version || '3.12' }} \
              --no-deps \
              2>&1 || echo "  [SKIP] no $PLATFORM wheel for: $pkg"
          done < /tmp/requirements.txt

      - name: Rename for Termux compatibility
        if: matrix.platform == 'aarch64'
        run: |
          cd dist/deps
          for whl in *.whl; do
            [ -f "$whl" ] || continue
            newname=$(echo "$whl" | sed 's/manylinux[0-9_]*/linux/g; s/musllinux[0-9_]*/linux/g')
            [ "$whl" != "$newname" ] && mv -v "$whl" "$newname"
          done

      - name: Bundle
        run: |
          cd /tmp/watch-skill
          mkdir -p dist 2>/dev/null
          # 收集 wheel
          cp ${{ github.workspace }}/dist/deps/*.whl dist/ 2>/dev/null || true
          cp ${{ github.workspace }}/dist/*.whl dist/ 2>/dev/null || true
          # 安装脚本
          cat > dist/install-termux.sh << 'SCRIPT'
          #!/data/data/com.termux/files/usr/bin/bash
          set -euo pipefail
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          pip install --no-index --find-links "$SCRIPT_DIR" --no-deps watch-skill
          for whl in "$SCRIPT_DIR"/*.whl; do
            pip install --no-index --find-links "$SCRIPT_DIR" --no-deps "$whl"
          done
          echo "✅ watch-skill installed. Run: watch-skill serve"
          SCRIPT
          chmod +x dist/install-termux.sh
          # 打包
          tar czf ${{ github.workspace }}/watch-skill-${{ matrix.platform }}-py${{ github.event.inputs.python-version || '3.12' }}.tar.gz \
            -C dist .
          ls -lh ${{ github.workspace }}/watch-skill-${{ matrix.platform }}-*.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: watch-skill-${{ matrix.platform }}
          path: watch-skill-${{ matrix.platform }}-*.tar.gz
