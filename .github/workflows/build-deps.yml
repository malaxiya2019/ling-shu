name: Build External Dependencies

on:
  workflow_dispatch:
    inputs:
      python-version:
        default: "3.12"
        type: choice
        options: ["3.11", "3.12"]
      extras:
        default: "api"

permissions:
  contents: write

jobs:
  build-watch-skill:
    name: watch-skill ${{ matrix.platform }}
    strategy:
      matrix:
        include:
          - platform: x86_64
            pip_platform: manylinux2014_x86_64
          - platform: aarch64
            pip_platform: manylinux2014_aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: oxbshw/watch-skill
          path: watch-skill

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ github.event.inputs.python-version || '3.12' }}

      - name: Build & install
        working-directory: watch-skill
        run: |
          uv build
          uv sync --no-dev --extra ${{ github.event.inputs.extras || 'api' }}
          # uv 不使用标准 venv/bin/pip，用 uv tool 或 uv run
          uv run --frozen pip list --format=freeze 2>/dev/null | grep -v "^watch-skill @ " > /tmp/requirements.txt || \
            uv pip freeze 2>/dev/null | grep -v "^watch-skill @ " > /tmp/requirements.txt || \
            true
          echo "DEPS: $(wc -l < /tmp/requirements.txt) packages"
          head -5 /tmp/requirements.txt

      - name: Download ${{ matrix.pip_platform }} wheels
        run: |
          mkdir -p /tmp/wheels
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            pip download "$pkg" \
              --platform ${{ matrix.pip_platform }} \
              --only-binary :all: \
              --dest /tmp/wheels \
              --python-version ${{ github.event.inputs.python-version || '3.12' }} \
              --no-deps 2>&1 | head -1 || echo "[SKIP] $pkg"
          done < /tmp/requirements.txt
          echo "WHEELS: $(ls /tmp/wheels/*.whl 2>/dev/null | wc -l) files"

      - name: Rename (aarch64)
        if: matrix.platform == 'aarch64'
        run: |
          cd /tmp/wheels
          for whl in *.whl; do
            [ -f "$whl" ] || continue
            nn=$(echo "$whl" | sed -E 's/(manylinux|musllinux)[^.]*([.][^.]*)?/linux/g')
            [ "$whl" != "$nn" ] && mv -v "$whl" "$nn" || true
          done

      - name: Bundle
        run: |
          cp watch-skill/dist/*.whl /tmp/wheels/ 2>/dev/null || true
          cat > /tmp/wheels/install.sh << 'SCRIPT'
          #!/bin/sh
          pip install --no-index --find-links "$(dirname "$0")" watch-skill
          SCRIPT
          chmod +x /tmp/wheels/install.sh
          tar czf ${{ github.workspace }}/watch-skill-${{ matrix.platform }}.tar.gz -C /tmp/wheels .
          ls -lh ${{ github.workspace }}/watch-skill-${{ matrix.platform }}.tar.gz

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: watch-skill-${{ matrix.platform }}
          path: watch-skill-${{ matrix.platform }}.tar.gz
