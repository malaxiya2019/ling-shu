name: Benchmark

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  criterion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run criterion benchmarks (ratelimit)
        run: cargo bench -p lingshu-ratelimit -- --verbose
        continue-on-error: true

      - name: Run criterion benchmarks (billing)
        run: cargo bench -p lingshu-billing -- --verbose
        continue-on-error: true

  http-load-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lingshu_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p lingshu
        env:
          RUSTFLAGS: "-Dwarnings"

      - name: Install oha (HTTP load tester)
        run: cargo install oha

      - name: Start server (mock backend)
        run: |
          ./target/release/lingshu &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "✅ Server ready"
              break
            fi
            echo "⏳ Waiting... ($i/30)"
            sleep 2
          done

      - name: Load test — health endpoint
        run: |
          oha -n 5000 -c 10 -z 10s \
            http://localhost:8080/health

      - name: Load test — models endpoint
        run: |
          oha -n 5000 -c 10 -z 10s \
            http://localhost:8080/v1/models

      - name: Load test — chat completions (mock)
        run: |
          oha -n 2000 -c 5 -z 15s \
            -m POST \
            -H "Content-Type: application/json" \
            -d '{"model":"mock","messages":[{"role":"user","content":"hello"}],"stream":false}' \
            http://localhost:8080/v1/chat/completions

      - name: Load test — high concurrency burst
        run: |
          oha -n 10000 -c 50 -z 10s \
            http://localhost:8080/health

      - name: Stop server
        if: always()
        run: kill ${{ env.SERVER_PID }} || true

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 7
