name: Benchmark

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  criterion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update -o Acquire::http::Timeout=30 && sudo apt-get install -y protobuf-compiler libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install critcmp (benchmark comparison tool)
        run: cargo install critcmp

      - name: Run criterion benchmarks (ratelimit)
        run: cargo bench --bench ratelimit_bench -p lingshu-ratelimit -- --save-baseline pr
        continue-on-error: true

      - name: Run criterion benchmarks (billing)
        run: cargo bench --bench billing_bench -p lingshu-billing -- --save-baseline pr
        continue-on-error: true

      - name: Run criterion benchmarks (evaluator)
        run: cargo bench --bench evaluator_bench -p lingshu-evaluator -- --save-baseline pr
        continue-on-error: true

      - name: Download main-branch baseline
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: criterion-baseline-main
          path: target/criterion-main

      - name: Compare against main baseline
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          if [ -d target/criterion-main ]; then
            echo "### Benchmark Regression Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            critcmp target/criterion-main target/criterion/ \
              | tee -a $GITHUB_STEP_SUMMARY \
              || true
            
            # Check for regressions > 5%
            REGRESSIONS=$(critcmp target/criterion-main target/criterion/ 2>/dev/null | grep -E '\+[0-9]+\.[0-9]+%' | grep -v '^Change' | head -20)
            if [ -n "$REGRESSIONS" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### ⚠️ Potential Regressions Detected" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$REGRESSIONS" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "No main baseline found — skipping comparison"
          fi

      - name: Upload PR baseline artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: criterion-baseline-pr-${{ github.event.number }}
          path: target/criterion/
          retention-days: 7

      - name: Upload main baseline artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: criterion-baseline-main
          path: target/criterion/
          retention-days: 90

  http-load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update -o Acquire::http::Timeout=30 && sudo apt-get install -y protobuf-compiler libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build release binary
        run: cargo build --release -p lingshu

      - name: Install oha (HTTP load tester)
        run: cargo install oha

      - name: Start server & load test
        run: |
          # Start server in background
          ./target/release/lingshu --headless --addr 127.0.0.1:8080 &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "✅ Server ready"
              break
            fi
            echo "⏳ Waiting... ($i/30)"
            sleep 2
          done

          # Run load tests
          echo ""
          echo "=== 1/4: Health Check ==="
          oha -n 5000 -c 10 -z 10s http://localhost:8080/health || true

          echo ""
          echo "=== 2/4: List Models ==="
          oha -n 5000 -c 10 -z 10s http://localhost:8080/v1/models || true

          echo ""
          echo "=== 3/4: Chat Completions (mock) ==="
          oha -n 2000 -c 5 -z 15s \
            -m POST \
            -H "Content-Type: application/json" \
            -d '{"model":"mock","messages":[{"role":"user","content":"hello"}],"stream":false}' \
            http://localhost:8080/v1/chat/completions || true

          echo ""
          echo "=== 4/4: High Concurrency Burst ==="
          oha -n 10000 -c 50 -z 10s http://localhost:8080/health || true

          # Stop server
          kill $SERVER_PID 2>/dev/null || true
          echo ""
          echo "✅ Load test completed"

      - name: Parse oha results to summary
        if: always()
        run: |
          echo "### HTTP Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See uploaded artifact for full oha output." >> $GITHUB_STEP_SUMMARY

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 7
