name: Benchmark

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  criterion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run criterion benchmarks (ratelimit)
        run: cargo bench --bench ratelimit_bench -p lingshu-ratelimit
        continue-on-error: true

      - name: Run criterion benchmarks (billing)
        run: cargo bench --bench billing_bench -p lingshu-billing
        continue-on-error: true

  http-load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p lingshu
        env:
          RUSTFLAGS: "-Dwarnings"

      - name: Install oha (HTTP load tester)
        run: cargo install oha

      - name: Start server & load test
        run: |
          # Start server in background
          ./target/release/lingshu &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "✅ Server ready"
              break
            fi
            echo "⏳ Waiting... ($i/30)"
            sleep 2
          done

          # Run load tests
          echo ""
          echo "=== 1/4: Health Check ==="
          oha -n 5000 -c 10 -z 10s http://localhost:8080/health || true

          echo ""
          echo "=== 2/4: List Models ==="
          oha -n 5000 -c 10 -z 10s http://localhost:8080/v1/models || true

          echo ""
          echo "=== 3/4: Chat Completions (mock) ==="
          oha -n 2000 -c 5 -z 15s \
            -m POST \
            -H "Content-Type: application/json" \
            -d '{"model":"mock","messages":[{"role":"user","content":"hello"}],"stream":false}' \
            http://localhost:8080/v1/chat/completions || true

          echo ""
          echo "=== 4/4: High Concurrency Burst ==="
          oha -n 10000 -c 50 -z 10s http://localhost:8080/health || true

          # Stop server
          kill $SERVER_PID 2>/dev/null || true
          echo ""
          echo "✅ Load test completed"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 7
