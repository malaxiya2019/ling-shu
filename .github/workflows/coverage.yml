name: Code Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate code coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info --ignore-run-fail
        env:
          DATABASE_URL: sqlite::memory:

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
          retention-days: 30

      - name: Post coverage summary
        run: |
          if command -v cargo-llvm-cov &> /dev/null; then
            echo "### Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Coverage report generated with \`cargo-llvm-cov\`." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY

            # Extract line coverage percentage
            if [ -f lcov.info ]; then
              LINES=$(grep -c '^DA:' lcov.info 2>/dev/null || echo "0")
              HIT=$(grep '^DA:' lcov.info 2>/dev/null | awk -F',' '{s+=$2} END {print s}' || echo "0")
              echo "| Lines hit | $HIT |" >> $GITHUB_STEP_SUMMARY
              echo "| Lines total | ~$LINES |" >> $GITHUB_STEP_SUMMARY
            fi
          fi
