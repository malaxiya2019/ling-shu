name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install protoc
        run: sudo apt-get update -o Acquire::http::Timeout=30 && sudo apt-get install -y protobuf-compiler libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all
      - run: |
          cargo clippy --all-targets --all-features -- \
            -D clippy::correctness \
            -D clippy::suspicious \
            -A clippy::items_after_test_module \
            -A clippy::too_many_arguments \
            -A clippy::large_enum_variant \
            -A clippy::type_complexity \
            -W clippy::style \
            -W clippy::complexity \
            -W clippy::perf

  feature-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "chidori"
          - "autoagents"
          - "loong"
          - "chidori,autoagents,loong"
          - "chidori,autoagents,audit-sqlite"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update -o Acquire::http::Timeout=30 && sudo apt-get install -y protobuf-compiler libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: Swatinem/rust-cache@v2
      - name: Check with features [${{ matrix.features }}]
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo check --workspace --no-default-features
          else
            cargo check --workspace --no-default-features --features "${{ matrix.features }}"
          fi

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lingshu_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update -o Acquire::http::Timeout=30 && sudo apt-get install -y protobuf-compiler libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      # ── agent-device 插件依赖 ──
      - name: Install Node.js + agent-device
        run: |
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo bash -
          sudo apt-get install -y nodejs
          npm install -g agent-device
          echo "agent-device $(agent-device --version)"
      # ── SimpleCAD 插件依赖 ──
      - name: Install Python + SimpleCADAPI
        run: |
          sudo apt-get install -y python3 python3-pip
          pip3 install simplecadapi mcp
          python3 -c "import importlib.metadata; print('simplecadapi', importlib.metadata.version('simplecadapi'))"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all --features "chidori,autoagents,audit-sqlite"
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lingshu_test
      # ── 新插件单元测试单独报告 ──
      - name: agent-device plugin unit tests
        run: cargo test -p lingshu-agent-device-plugin --lib
      - name: simplecad plugin unit tests
        run: cargo test -p lingshu-simplecad-plugin --lib
      - run: cargo doc --no-deps --features "chidori,autoagents,audit-sqlite"
        env:
          RUSTDOCFLAGS: "-D rustdoc::broken-intra-doc-links"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update -o Acquire::http::Timeout=30 && sudo apt-get install -y protobuf-compiler libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: cargo build --release --features "chidori,autoagents,audit-sqlite"
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: lingshu-x86_64-linux
          path: target/release/lingshu
      - name: Smoke test
        run: |
          ./target/release/lingshu --headless --addr 127.0.0.1:8090 &
          SERVER_PID=$!
          sleep 2
          curl -sf http://127.0.0.1:8090/health | grep -q '"status":"ok"' && echo "Health check passed"
          kill $SERVER_PID 2>/dev/null || true

  plugin-test:
    name: Plugins (agent-device + SimpleCAD)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: lingshu-x86_64-linux
          path: ./target/release/
      - name: Install protoc
        run: sudo apt-get update -o Acquire::http::Timeout=30 && sudo apt-get install -y protobuf-compiler
      # ── agent-device 运行时测试 ──
      - name: Install Node.js + agent-device
        run: |
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo bash -
          sudo apt-get install -y nodejs
          npm install -g agent-device
      - name: Test agent-device MCP tools discovery
        run: |
          agent-device mcp &
          MCP_PID=$!
          sleep 3
          echo "agent-device MCP started (PID=$MCP_PID)"
          kill $MCP_PID 2>/dev/null || true
      # ── SimpleCAD 运行时测试 ──
      - name: Install Python + SimpleCADAPI
        run: |
          sudo apt-get install -y python3 python3-pip
          pip3 install simplecadapi mcp
      - name: Test SimpleCADAPI modeling
        run: python3 scripts/ci/test_simplecad.py
      # ── SimpleCAD MCP 服务器测试 ──
      - name: Test SimpleCAD MCP server startup
        run: |
          python3 -m simplecad_mcp.server &
          MCP_PID=$!
          sleep 2
          echo "SimpleCAD MCP started (PID=$MCP_PID)"
          kill $MCP_PID 2>/dev/null || true
      # ── ling-shu 二进制加载插件测试 ──
      - name: Test ling-shu plugin loading
        run: |
          chmod +x ./target/release/lingshu
          ./target/release/lingshu --headless --addr 127.0.0.1:8091 &
          SERVER_PID=$!
          sleep 3
          curl -sf http://127.0.0.1:8091/plugins 2>/dev/null | python3 scripts/ci/test_plugin_loading.py || echo "plugin API check skipped"
          kill $SERVER_PID 2>/dev/null || true

  webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install trunk
        run: |
          wget -qO- https://github.com/trunk-rs/trunk/releases/download/v0.21.8/trunk-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin
      - name: Build WebUI WASM
        run: cd webui && trunk build --release
      - name: Upload WebUI dist
        uses: actions/upload-artifact@v4
        with:
          name: lingshu-webui-dist
          path: webui/dist

  docker:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    needs: [lint, test, build, webui, feature-matrix, plugin-test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install security tools
        run: |
          cargo install cargo-audit
          cargo install cargo-deny
      - name: Run cargo audit
        run: cargo audit
        continue-on-error: true
      - name: Run cargo deny
        run: cargo deny check
        continue-on-error: true

  fuzz:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update -o Acquire::http::Timeout=30 && sudo apt-get install -y protobuf-compiler libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Run fuzz targets (short smoke test)
        run: |
          for target in federation_message mcp_jsonrpc credential_crypto; do
            echo "=== Fuzzing: $target ==="
            cargo fuzz run "$target" -- -max_total_time=30 -print_pcs=0 2>&1 || echo "Fuzz target $target completed or timed out"
          done
        working-directory: fuzz
