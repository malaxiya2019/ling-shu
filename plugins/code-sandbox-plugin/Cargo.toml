[package]
name = "lingshu-code-sandbox"
version = "1.0.0"
edition.workspace = true
description = "Code Sandbox Plugin — secure code execution in WASM/subprocess sandbox"

[lib]
crate-type = ["lib"]

[dependencies]
lingshu-core = { path = "../../core" }
lingshu-traits = { path = "../../traits" }

async-trait.workspace = true
tokio = { workspace = true, features = ["process", "time"] }
tracing.workspace = true
serde.workspace = true
serde_json.workspace = true
chrono.workspace = true
uuid.workspace = true
tempfile = "3"

[features]
default = ["simple"]
simple = []
wasm = []

[target.'cfg(not(target_os = "android"))'.dependencies]
wasmtime = { version = "24", optional = true, features = ["component-model"] }
wasmtime-wasi = { version = "24", optional = true }
