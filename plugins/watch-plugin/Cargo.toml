[package]
name = "lingshu-watch-plugin"
version = "1.0.0"
edition.workspace = true
description = "Watch Skill — video analysis plugin for LingShu. Wraps the watch-skill CLI (Python)"

[lib]
crate-type = ["lib", "cdylib"]

[dependencies]
lingshu-core = { path = "../../core" }
lingshu-traits = { path = "../../traits" }

async-trait.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
tokio = { workspace = true, features = ["process", "signal", "sync"] }
tracing.workspace = true
thiserror.workspace = true
reqwest = { version = "0.12", features = ["json"] }
