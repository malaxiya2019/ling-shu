[package]
name = "lingshu-wasm-plugin"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "LingShu WASM Plugin SDK Template"

[lib]
crate-type = ["cdylib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
default = []

[profile.release]
opt-level = "s"
lto = true
strip = true
