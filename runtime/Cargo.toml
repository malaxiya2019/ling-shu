[package]
name = "lingshu-runtime"
version.workspace = true
edition.workspace = true
description = "LSRuntime — Runtime implementation: lifecycle, scheduler, session, recovery"

[dependencies]
lingshu-core = { path = "../core" }
lingshu-traits = { path = "../traits" }
lingshu-tool = { path = "../tool" }
lingshu-plugin = { path = "../plugin" }
lingshu-eventbus = { path = "../eventbus" }
lingshu-security = { path = "../security" }
lingshu-observability = { path = "../observability" }
lingshu-memory = { path = "../memory", optional = true }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
tokio = { workspace = true, features = ["sync"] }
tracing.workspace = true
axum = { version = "0.7", features = ["json", "macros", "ws"], optional = true }
tower = { version = "0.5", optional = true }
futures = { workspace = true, optional = true }

# ── Optional external integrations ──
chidori = { git = "https://github.com/malaxiya2019/chidori-fork.git", rev = "8657d9f68d2f8451ea6beb96e4f602f7bce4cf37", optional = true }

[features]
otel = ["lingshu-observability/otel"]
api-server = ["dep:axum", "dep:tower", "dep:futures"]
chidori = ["dep:chidori"]
memory-summarizer = ["dep:lingshu-memory"]
