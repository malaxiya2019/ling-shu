[package]
name = "agent-device-demo"
version = "0.1.0"
edition.workspace = true
description = "agent-device 插件集成示例：一站式初始化 MCP 设备自动化"

[dependencies]
lingshu-agent-device-plugin = { path = "../../plugins/agent-device-plugin" }
lingshu-traits = { path = "../../traits" }
lingshu-tool = { path = "../../tool" }
lingshu-core = { path = "../../core" }
tokio = { workspace = true, features = ["rt", "macros"] }
tracing = { workspace = true, features = ["log"] }
tracing-subscriber = "0.3"
serde_json = { workspace = true }
