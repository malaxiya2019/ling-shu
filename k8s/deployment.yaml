apiVersion: apps/v1
kind: Deployment
metadata:
  name: lingshu
  namespace: lingshu
  labels:
    app.kubernetes.io/name: lingshu
    app.kubernetes.io/component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: lingshu
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lingshu
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: lingshu
          image: ghcr.io/malaxiya2019/lingshu:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: cluster
            - containerPort: 9550
              name: federation
              protocol: TCP
          env:
            - name: LS_ENV
              valueFrom:
                configMapKeyRef:
                  name: lingshu-config
                  key: LS_ENV
            - name: LS_CLUSTER_ADDR
              valueFrom:
                configMapKeyRef:
                  name: lingshu-config
                  key: LS_CLUSTER_ADDR
            - name: LS_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: lingshu-config
                  key: LS_LOG_LEVEL
            - name: LS_FEDERATION_PORT
              valueFrom:
                configMapKeyRef:
                  name: lingshu-config
                  key: LS_FEDERATION_PORT
            - name: LS_FEDERATION_ENABLED
              value: "true"
            - name: LS_CLUSTER_NAME
              valueFrom:
                configMapKeyRef:
                  name: lingshu-config
                  key: LS_CLUSTER_NAME
            - name: LS_CLUSTER_SEED
              valueFrom:
                configMapKeyRef:
                  name: lingshu-config
                  key: LS_CLUSTER_SEED
            - name: LS_PLUGIN_MARKET_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: lingshu-config
                  key: LS_PLUGIN_MARKET_ENABLED
            - name: LS_PLUGIN_INSTALL_DIR
              valueFrom:
                configMapKeyRef:
                  name: lingshu-config
                  key: LS_PLUGIN_INSTALL_DIR
            - name: LS_PLUGIN_AUTO_DISCOVER
              valueFrom:
                configMapKeyRef:
                  name: lingshu-config
                  key: LS_PLUGIN_AUTO_DISCOVER
            - name: LS_PLUGIN_REFRESH_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: lingshu-config
                  key: LS_PLUGIN_REFRESH_INTERVAL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lingshu-secrets
                  key: openai_api_key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lingshu-secrets
                  key: anthropic_api_key
                  optional: true
            - name: LINGSHU_CREDENTIAL_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: lingshu-secrets
                  key: credential_master_key
                  optional: true
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/lingshu
            - name: plugins
              mountPath: /var/lib/lingshu/plugins
            - name: config
              mountPath: /etc/lingshu/config
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lingshu-data
        - name: plugins
          emptyDir: {}
        - name: config
          configMap:
            name: lingshu-config
