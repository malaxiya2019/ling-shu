apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lingshu
  namespace: lingshu
  labels:
    app.kubernetes.io/name: lingshu
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: api.lingshu.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lingshu
                port:
                  number: 8080
  tls:
    - hosts:
        - api.lingshu.local
      secretName: lingshu-tls
